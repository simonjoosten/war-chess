<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F2937"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FCD34D"/>
      <stop offset="50%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <linearGradient id="steel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9CA3AF"/>
      <stop offset="50%" style="stop-color:#6B7280"/>
      <stop offset="100%" style="stop-color:#4B5563"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Decorative corner accents -->
  <path d="M0 96 L0 0 L96 0 Q0 0 0 96" fill="#F59E0B" opacity="0.3"/>
  <path d="M512 96 L512 0 L416 0 Q512 0 512 96" fill="#F59E0B" opacity="0.3"/>
  <path d="M0 416 L0 512 L96 512 Q0 512 0 416" fill="#F59E0B" opacity="0.3"/>
  <path d="M512 416 L512 512 L416 512 Q512 512 512 416" fill="#F59E0B" opacity="0.3"/>

  <!-- Chess piece - stylized king/commander -->
  <g transform="translate(256, 280)" filter="url(#shadow)">
    <!-- Base -->
    <ellipse cx="0" cy="120" rx="90" ry="25" fill="url(#steel)"/>
    <rect x="-80" y="95" width="160" height="25" fill="url(#steel)"/>

    <!-- Body -->
    <path d="M-60 95 L-45 20 Q-45 0 0 0 Q45 0 45 20 L60 95 Z" fill="url(#gold)"/>

    <!-- Crown points -->
    <path d="M-35 0 L-25 -50 L-15 -20 L0 -60 L15 -20 L25 -50 L35 0 Z" fill="url(#gold)"/>

    <!-- Crown jewel -->
    <circle cx="0" cy="-35" r="12" fill="#EF4444"/>
    <circle cx="0" cy="-35" r="6" fill="#FCA5A5"/>

    <!-- Details -->
    <ellipse cx="0" cy="50" rx="35" ry="8" fill="#D97706" opacity="0.5"/>
    <rect x="-30" y="70" width="60" height="8" rx="4" fill="#D97706" opacity="0.5"/>
  </g>

  <!-- Crossed swords behind -->
  <g transform="translate(256, 256)" opacity="0.6">
    <!-- Left sword -->
    <g transform="rotate(-30)">
      <rect x="-8" y="-180" width="16" height="140" fill="url(#steel)"/>
      <polygon points="0,-180 -12,-220 12,-220" fill="url(#steel)"/>
      <rect x="-20" y="-45" width="40" height="12" rx="2" fill="#92400E"/>
      <rect x="-6" y="-45" width="12" height="50" fill="#78350F"/>
    </g>
    <!-- Right sword -->
    <g transform="rotate(30)">
      <rect x="-8" y="-180" width="16" height="140" fill="url(#steel)"/>
      <polygon points="0,-180 -12,-220 12,-220" fill="url(#steel)"/>
      <rect x="-20" y="-45" width="40" height="12" rx="2" fill="#92400E"/>
      <rect x="-6" y="-45" width="12" height="50" fill="#78350F"/>
    </g>
  </g>

  <!-- "W" letter subtle watermark -->
  <text x="256" y="480" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="48" font-weight="bold" fill="#F59E0B" opacity="0.4">WAR CHESS</text>
</svg>
